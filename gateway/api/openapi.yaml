openapi: 3.0.3
info:
  title: Adventist Stack API
  description: API Gateway REST del ecosistema Adventist Stack (microservicios gRPC).
  version: 0.1.0
servers:
  - url: http://localhost:8090
paths:
  /health:
    get:
      summary: Liveness probe
      responses:
        "200":
          description: OK
  /api/v1/auth/register:
    post:
      summary: Registrar un usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email ya registrado
  /api/v1/auth/login:
    post:
      summary: Iniciar sesión
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Sesión iniciada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Credenciales inválidas
  /api/v1/me:
    get:
      summary: Usuario autenticado
      security:
        - bearerAuth: []
      responses:
        "200":
          description: OK
        "401":
          description: No autenticado
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [email, name, password]
      properties:
        email: { type: string, format: email }
        name: { type: string }
        password: { type: string, format: password, minLength: 8 }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
    AuthResponse:
      type: object
      properties:
        user:
          type: object
          properties:
            id: { type: string }
            email: { type: string }
            name: { type: string }
            role: { type: string }
        access_token: { type: string }
        refresh_token: { type: string }
