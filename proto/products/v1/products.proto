syntax = "proto3";

package products.v1;

option go_package = "github.com/Jeudry/adventist-stack/gen/products/v1;productsv1";

import "google/protobuf/timestamp.proto";

enum ProductStatus {
  PRODUCT_STATUS_UNSPECIFIED = 0;
  PRODUCT_STATUS_ACTIVE = 1;
  PRODUCT_STATUS_INACTIVE = 2;
  PRODUCT_STATUS_DISCONTINUED = 3;
}

message Product {
  string id = 1;
  string name = 2;
  string sku = 3;
  optional string description = 4;
  optional string brand = 5;
  google.protobuf.Timestamp release_date = 6;
  ProductStatus status = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message CreateProductRequest {
  string name = 1;
  string sku = 2;
  optional string description = 3;
  optional string brand = 4;
  google.protobuf.Timestamp release_date = 5;
  ProductStatus status = 6;
}

message CreateProductResponse {
  Product product = 1;
}

message GetProductRequest {
  string id = 1;
}

message GetProductResponse {
  Product product = 1;
}

message ListProductsRequest {
  int32 page = 1;
  int32 page_size = 2;
  optional string search = 3;
}

message ListProductsResponse {
  repeated Product items = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message UpdateProductRequest {
  string id = 1;
  string name = 2;
  string sku = 3;
  optional string description = 4;
  optional string brand = 5;
  google.protobuf.Timestamp release_date = 6;
  ProductStatus status = 7;
}

message UpdateProductResponse {
  Product product = 1;
}

message DeleteProductRequest {
  string id = 1;
}

message DeleteProductResponse {
  bool deleted = 1;
}

service ProductService {
  rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse);
  rpc GetProduct(GetProductRequest) returns (GetProductResponse);
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);
  rpc UpdateProduct(UpdateProductRequest) returns (UpdateProductResponse);
  rpc DeleteProduct(DeleteProductRequest) returns (DeleteProductResponse);
}
