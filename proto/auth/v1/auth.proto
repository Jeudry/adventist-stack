syntax = "proto3";

package auth.v1;

option go_package = "github.com/Jeudry/adventist-stack/gen/auth/v1;authv1";

// AuthService maneja registro, login y validación de tokens.
service AuthService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);
}

message User {
  string id = 1;
  string email = 2;
  string name = 3;
  string role = 4;
}

// Session son los datos de sesión (usuario + tokens) que comparten las
// respuestas de auth. Se anida dentro de cada *Response para no duplicar
// campos, sin violar la regla de "response único por RPC".
message Session {
  User user = 1;
  string access_token = 2;
  string refresh_token = 3;
}

message RegisterRequest {
  string email = 1;
  string name = 2;
  string password = 3;
}

message RegisterResponse {
  Session session = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  Session session = 1;
}

message ValidateTokenRequest {
  string access_token = 1;
}

message ValidateTokenResponse {
  bool valid = 1;
  string user_id = 2;
  string role = 3;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message RefreshTokenResponse {
  Session session = 1;
}
