syntax = "proto3";

// package = namespace lógico de la API + su versión (v1).
package members.v1;

// go_package: dónde y con qué nombre generar el código Go.
option go_package = "github.com/Jeudry/adventist-stack/gen/members/v1;membersv1";

// Timestamp: tipo estándar de Google (fecha/hora en UTC). Viene incluido con
// protoc, por eso se puede importar sin dependencias extra.
import "google/protobuf/timestamp.proto";

// ─────────────────────────────────────────────────────────────
// Enum: estado del miembro. El valor 0 SIEMPRE es UNSPECIFIED.
// ─────────────────────────────────────────────────────────────
enum MemberStatus {
  MEMBER_STATUS_UNSPECIFIED = 0;
  MEMBER_STATUS_ACTIVE = 1;    // miembro activo
  MEMBER_STATUS_INACTIVE = 2;  // dado de baja / inactivo
  MEMBER_STATUS_VISITOR = 3;   // visitante
}

// ─────────────────────────────────────────────────────────────
// Member: la entidad completa tal como la DEVUELVE el servidor.
// El número (= N) es la identidad binaria del campo, no un valor.
// ─────────────────────────────────────────────────────────────
message Member {
  string id = 1;
  string first_name = 2;
  string last_name = 3;
  optional string email = 4;         // puede no tener email
  optional string phone = 5;
  google.protobuf.Timestamp birth_date = 6;    // fecha de nacimiento (UTC)
  string gender = 7;
  optional string address = 8;
  google.protobuf.Timestamp baptism_date = 9;  // fecha de bautismo (UTC)
  MemberStatus status = 10;
  google.protobuf.Timestamp created_at = 11;   // lo pone el server
  google.protobuf.Timestamp updated_at = 12;   // lo pone el server
}

message CreateMemberRequest {
  string first_name = 1;
  string last_name = 2;
  optional string email = 3;
  optional string phone = 4;
  google.protobuf.Timestamp birth_date = 5;
  string gender = 6;
  optional string address = 7;
  google.protobuf.Timestamp baptism_date = 8;
  MemberStatus status = 9;
}

message GetMemberRequest {
    string id = 1;
}

message UpdateMemberRequest {
    string id = 1;
    string first_name = 2;
    string last_name = 3;
    optional string email = 4;
    optional string phone = 5;
    google.protobuf.Timestamp birth_date = 6;
    string gender = 7;
    optional string address = 8;
    google.protobuf.Timestamp baptism_date = 9;
    MemberStatus status = 10;
}

message DeleteMemberRequest {
    string id = 1;
}

message DeleteMemberResponse {
    bool deleted = 1;
}

message ListMembersRequest {
    int32 page = 1;
    int32 page_size = 2;
    optional string search = 3;
}

message ListMembersResponse {
    repeated Member items = 1;
    int32 total = 2;
    int32 page = 3;
    int32 page_size = 4;
}

service MemberService {
    rpc CreateMember(CreateMemberRequest) returns (Member);
    rpc GetMember(GetMemberRequest) returns (Member);
    rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
    rpc UpdateMember(UpdateMemberRequest) returns (Member);
    rpc DeleteMember(DeleteMemberRequest) returns (DeleteMemberResponse);
}
